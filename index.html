<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Echo AI</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body data-theme="dark">

  <button id="menuToggle" class="menu-toggle" aria-label="Toggle sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <span class="brand-mark">◎</span>
          <span class="brand-name">Echo</span>
        </div>
        <button id="newChatBtn" class="new-chat-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New chat
        </button>
      </div>

      <nav class="history-list" id="historyList" aria-label="Chat history"></nav>

      <div class="sidebar-footer">
        <button id="themeToggle" class="theme-toggle">
          <span id="themeIcon">☾</span>
          <span id="themeLabel">Dark mode</span>
        </button>
        <div class="model-tag" id="modelTag">Checking connection…</div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="chat-main">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-mark">◎</div>
          <h1>Echo AI</h1>
          <p>Ask anything. Answers stream in as they're generated.</p>
        </div>
      </div>

      <div class="composer">
        <form id="composerForm" class="composer-form">
          <textarea
            id="promptInput"
            class="prompt-input"
            placeholder="Message Echo…"
            rows="1"
            autofocus
          ></textarea>
          <button type="submit" id="sendBtn" class="send-btn" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </form>
        <p class="composer-hint">Echo can make mistakes. Verify important information.</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
